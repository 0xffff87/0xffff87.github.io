<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简历投递助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- 顶部标题栏 -->
    <header class="header">
      <div class="header-content">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="12" fill="rgba(255,255,255,0.2)"/>
            <rect x="7" y="5" width="10" height="14" rx="1.5" fill="white"/>
            <line x1="9.5" y1="11" x2="14.5" y2="11" stroke="#667eea" stroke-width="1.2"/>
            <line x1="9.5" y1="13.5" x2="14.5" y2="13.5" stroke="#667eea" stroke-width="1.2"/>
            <line x1="9.5" y1="16" x2="13" y2="16" stroke="#667eea" stroke-width="1.2"/>
            <circle cx="12" cy="8.5" r="1.5" fill="#667eea"/>
          </svg>
        </div>
        <h1>简历投递助手</h1>
        <button id="btn-settings" class="btn-icon" title="AI设置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 标签页导航 -->
    <nav class="tabs">
      <button class="tab active" data-tab="basic">基本信息</button>
      <button class="tab" data-tab="education">教育经历</button>
      <button class="tab" data-tab="experience">工作经历</button>
      <button class="tab" data-tab="project">项目经历</button>
      <button class="tab" data-tab="extras">技能/其他</button>
    </nav>

    <!-- 内容区域 -->
    <main class="content">
      <!-- 基本信息 -->
      <section class="tab-panel active" id="panel-basic">
        <div class="form-group">
          <label>姓名 <span class="required">*</span></label>
          <input type="text" id="name" placeholder="请输入姓名">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>性别</label>
            <select id="gender">
              <option value="">请选择</option>
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
          <div class="form-group">
            <label>出生日期</label>
            <input type="date" id="birthday">
          </div>
        </div>
        <div class="form-group">
          <label>手机号码 <span class="required">*</span></label>
          <input type="tel" id="phone" placeholder="请输入手机号码">
        </div>
        <div class="form-group">
          <label>电子邮箱</label>
          <input type="email" id="email" placeholder="请输入邮箱地址">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>民族</label>
            <input type="text" id="ethnicity" placeholder="如：汉族">
          </div>
          <div class="form-group">
            <label>政治面貌</label>
            <select id="political">
              <option value="">请选择</option>
              <option value="中共党员">中共党员</option>
              <option value="中共预备党员">中共预备党员</option>
              <option value="共青团员">共青团员</option>
              <option value="群众">群众</option>
              <option value="民主党派">民主党派</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>籍贯</label>
          <input type="text" id="hometown" placeholder="如：山东省济南市">
        </div>
        <div class="form-group">
          <label>身份证号</label>
          <input type="text" id="idcard" placeholder="请输入身份证号码">
        </div>

        <h3 class="section-title" style="margin-top: 12px;">居住信息</h3>
        <div class="form-row">
          <div class="form-group">
            <label>当前居住国家</label>
            <input type="text" id="currentCountry" placeholder="如：中国">
          </div>
          <div class="form-group">
            <label>当前居住城市</label>
            <input type="text" id="currentCity" placeholder="如：济南">
          </div>
        </div>
        <div class="form-group">
          <label>详细地址</label>
          <input type="text" id="address" placeholder="请输入详细地址">
        </div>

        <h3 class="section-title">求职意向</h3>
        <div class="form-row">
          <div class="form-group">
            <label>意向工作国家</label>
            <input type="text" id="targetCountry" placeholder="如：中国">
          </div>
          <div class="form-group">
            <label>意向工作城市</label>
            <input type="text" id="targetCity" placeholder="如：北京、上海">
          </div>
        </div>
        <div class="form-group">
          <label>意向岗位</label>
          <input type="text" id="targetPosition" placeholder="如：后端开发工程师">
        </div>
        <div class="form-group">
          <label>期望薪资</label>
          <input type="text" id="expectedSalary" placeholder="如：15k-25k">
        </div>

        <div class="form-group">
          <label>个人简介</label>
          <textarea id="summary" rows="3" placeholder="简要描述自己的特点和求职意向"></textarea>
        </div>
      </section>

      <!-- 教育经历 -->
      <section class="tab-panel" id="panel-education">
        <div id="education-list"></div>
        <button class="btn-add" id="btn-add-edu">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          添加教育经历
        </button>
      </section>

      <!-- 实习/工作经历 -->
      <section class="tab-panel" id="panel-experience">
        <div id="experience-list"></div>
        <button class="btn-add" id="btn-add-exp">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          添加实习/工作经历
        </button>
      </section>

      <!-- 项目经历 -->
      <section class="tab-panel" id="panel-project">
        <div id="project-list"></div>
        <button class="btn-add" id="btn-add-proj">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          添加项目经历
        </button>
      </section>

      <!-- 技能/其他 -->
      <section class="tab-panel" id="panel-extras">
        <h3 class="section-title">获奖经历</h3>
        <div id="awards-list"></div>
        <button class="btn-add" id="btn-add-award">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          添加获奖经历
        </button>

        <h3 class="section-title" style="margin-top: 16px;">专业技能</h3>
        <div class="form-group">
          <textarea id="skills" rows="3" placeholder="请输入专业技能，如：熟练使用 Python、Java；熟悉数据结构与算法..."></textarea>
        </div>

        <h3 class="section-title">主要课程成绩</h3>
        <div class="form-group">
          <textarea id="courses" rows="3" placeholder="如：数据结构 95分、算法设计 90分、操作系统 88分..."></textarea>
        </div>

        <h3 class="section-title">证书</h3>
        <div class="form-group">
          <textarea id="certificates" rows="2" placeholder="请输入证书信息，如：CET-6 550分、普通话二级甲等..."></textarea>
        </div>

        <h3 class="section-title">语言能力</h3>
        <div class="form-group">
          <textarea id="languages" rows="2" placeholder="如：普通话（母语）、英语（CET-6 / 雅思7.0）、日语（N2）"></textarea>
        </div>

        <h3 class="section-title">兴趣爱好</h3>
        <div class="form-group">
          <textarea id="hobbies" rows="2" placeholder="请输入兴趣爱好"></textarea>
        </div>
      </section>
    </main>

    <!-- 底部操作栏 -->
    <footer class="footer">
      <div class="footer-row">
        <button class="btn btn-demo" id="btn-demo" title="加载示例数据">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          示例
        </button>
        <button class="btn btn-secondary" id="btn-fill">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          一键填写
        </button>
        <button class="btn btn-primary" id="btn-save">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
          保存信息
        </button>
      </div>
      <div class="footer-row footer-sub">
        <button class="btn-link" id="btn-online" title="在网页端编辑简历（更大的编辑界面）">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          在线编辑
        </button>
        <button class="btn-link" id="btn-export" title="导出简历数据为JSON文件">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          导出
        </button>
        <button class="btn-link" id="btn-import" title="从JSON文件导入简历数据">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          导入
        </button>
        <input type="file" id="import-file" accept=".json" style="display:none">
        <button class="btn-link" id="btn-clear" title="清空所有数据">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          清空
        </button>
      </div>
    </footer>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
