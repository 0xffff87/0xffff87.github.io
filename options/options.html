<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简历投递助手 - 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div class="header-inner">
        <div class="logo-area">
          <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14,2 14,8 20,8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
          </div>
          <div>
            <h1>简历投递助手</h1>
            <p class="subtitle">后端服务设置</p>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="card">
        <h2 class="card-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
            <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
            <line x1="6" y1="6" x2="6.01" y2="6"/>
            <line x1="6" y1="18" x2="6.01" y2="18"/>
          </svg>
          后端服务
        </h2>
        <p class="card-desc">配置后端服务器地址和插件授权密钥，用于日志收集和插件授权验证。</p>

        <div class="form-group">
          <label for="serverUrl">服务器地址</label>
          <input type="url" id="serverUrl" placeholder="http://192.168.1.8:5000">
          <span class="form-hint">后端服务的完整地址，例如 http://j1900:5000</span>
        </div>

        <div class="form-group">
          <label for="pluginKey">插件密钥</label>
          <div class="input-with-action">
            <input type="password" id="pluginKey" placeholder="rh-xxxxxxxxxxxxxxxx">
            <button class="btn-toggle-pwd" id="btn-toggle-key" title="显示/隐藏">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="form-hint">从后端管理员获取的授权密钥</span>
        </div>

        <div class="test-area">
          <button class="btn btn-test" id="btn-test-backend">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            测试后端
          </button>
          <div class="test-result" id="backend-result"></div>
        </div>
      </div>

      <div class="card">
        <h2 class="card-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a4 4 0 014 4v1a1 1 0 001 1h1a4 4 0 010 8h-1a1 1 0 00-1 1v1a4 4 0 01-8 0v-1a1 1 0 00-1-1H6a4 4 0 010-8h1a1 1 0 001-1V6a4 4 0 014-4z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          AI 服务配置
        </h2>
        <p class="card-desc">配置 AI 接口地址和 API Key，用于智能匹配规则未覆盖的表单字段。</p>

        <div class="form-group">
          <label>AI 服务商</label>
          <div class="provider-grid">
            <label class="provider-option">
              <input type="radio" name="aiProvider" value="siliconflow">
              <div class="provider-card">
                <div class="provider-name">SiliconFlow</div>
                <div class="provider-desc">硅基流动</div>
              </div>
            </label>
            <label class="provider-option">
              <input type="radio" name="aiProvider" value="deepseek">
              <div class="provider-card">
                <div class="provider-name">DeepSeek</div>
                <div class="provider-desc">深度求索</div>
              </div>
            </label>
            <label class="provider-option">
              <input type="radio" name="aiProvider" value="zhipu">
              <div class="provider-card">
                <div class="provider-name">智谱 AI</div>
                <div class="provider-desc">GLM 系列</div>
              </div>
            </label>
            <label class="provider-option">
              <input type="radio" name="aiProvider" value="moonshot">
              <div class="provider-card">
                <div class="provider-name">Moonshot</div>
                <div class="provider-desc">Kimi</div>
              </div>
            </label>
            <label class="provider-option">
              <input type="radio" name="aiProvider" value="openai">
              <div class="provider-card">
                <div class="provider-name">OpenAI</div>
                <div class="provider-desc">GPT 系列</div>
              </div>
            </label>
            <label class="provider-option">
              <input type="radio" name="aiProvider" value="custom">
              <div class="provider-card">
                <div class="provider-name">自定义</div>
                <div class="provider-desc">其他接口</div>
              </div>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="aiEndpoint">API 地址</label>
          <input type="url" id="aiEndpoint" placeholder="https://api.siliconflow.cn/v1/chat/completions">
          <span class="form-hint">AI 服务的 Chat Completions 接口地址</span>
        </div>

        <div class="form-group">
          <label for="aiApiKey">API Key</label>
          <div class="input-with-action">
            <input type="password" id="aiApiKey" placeholder="sk-xxxxxxxxxxxxxxxx">
            <button class="btn-toggle-pwd" id="btn-toggle-ai-key" title="显示/隐藏">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="form-hint">在对应服务商官网注册获取的 API Key</span>
        </div>

        <div class="form-group">
          <label for="aiModel">模型名称</label>
          <input type="text" id="aiModel" placeholder="Qwen/Qwen2.5-VL-72B-Instruct">
          <span class="form-hint">推荐使用多模态（支持图片识别）模型以获得更好效果</span>
        </div>

        <div class="test-area">
          <button class="btn btn-test" id="btn-test-ai">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            测试 AI
          </button>
          <div class="test-result" id="ai-result"></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary btn-lg" id="btn-save">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
            <polyline points="17,21 17,13 7,13 7,21"/>
            <polyline points="7,3 7,8 15,8"/>
          </svg>
          保存设置
        </button>
      </div>
    </main>

    <div id="toast" class="toast"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
